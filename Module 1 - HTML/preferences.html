<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saving User Preferences</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        select, button {
            padding: 8px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <h2>Preferred Event Type</h2>

    <select id="eventType">
        <option value="">Select Event</option>
        <option value="Music Festival">Music Festival</option>
        <option value="Food Fair">Food Fair</option>
        <option value="Sports Meet">Sports Meet</option>
    </select>

    <br>

    <button onclick="savePreference()">Save Preference</button>
    <button onclick="clearPreferences()">Clear Preferences</button>

    <p id="message"></p>

    <script>
        window.onload = function () {
            let savedEvent = localStorage.getItem("preferredEvent");

            if (savedEvent) {
                document.getElementById("eventType").value = savedEvent;
            }
        };

        function savePreference() {
            let eventType = document.getElementById("eventType").value;

            localStorage.setItem("preferredEvent", eventType);
            sessionStorage.setItem("currentEvent", eventType);

            document.getElementById("message").innerHTML =
                "Preference saved successfully!";
        }

        function clearPreferences() {
            localStorage.clear();
            sessionStorage.clear();

            document.getElementById("eventType").value = "";
            document.getElementById("message").innerHTML =
                "Preferences cleared!";
        }
    </script>

</body>
</html>
