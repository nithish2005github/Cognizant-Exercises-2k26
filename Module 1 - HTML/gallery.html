<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>
    <style>
        .event-image {
            width: 200px;
            height: 150px;
            border: 2px solid black;
        }

        table {
            margin: auto;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        caption {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <table>
        <caption>Community Event Gallery</caption>

        <tr>
            <td>
                <img src="event1.jpg" alt="Music Festival" title="Music Festival" class="event-image">
                <p>Music Festival</p>
            </td>
            <td>
                <img src="event2.jpg" alt="Food Fair" title="Food Fair" class="event-image">
                <p>Food Fair</p>
            </td>
            <td>
                <img src="event3.jpg" alt="Sports Meet" title="Sports Meet" class="event-image">
                <p>Sports Meet</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="event4.jpg" alt="Art Exhibition" title="Art Exhibition" class="event-image">
                <p>Art Exhibition</p>
            </td>
            <td>
                <img src="event5.jpg" alt="Book Fair" title="Book Fair" class="event-image">
                <p>Book Fair</p>
            </td>
            <td>
                <img src="event6.jpg" alt="Community Cleanup" title="Community Cleanup" class="event-image">
                <p>Community Cleanup</p>
            </td>
        </tr>
    </table>

</body>
</html>
