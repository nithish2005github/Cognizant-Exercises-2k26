<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debugging Demo</title>
    <style>
        #box {
            width: 200px;
            padding: 20px;
            background-color: lightblue;
            text-align: center;
            margin: 20px;
        }
    </style>
</head>
<body>

    <div id="box">Debug Me</div>

    <button onclick="calculate()">Run Script</button>

    <p id="result"></p>

    <script>
        function calculate() {
            let a = 10;
            let b = 20;
            let sum = a + b;

            console.log("Value of a:", a);
            console.log("Value of b:", b);
            console.log("Sum:", sum);

            document.getElementById("result").innerHTML =
                "Sum = " + sum;
        }
    </script>

</body>
</html>
