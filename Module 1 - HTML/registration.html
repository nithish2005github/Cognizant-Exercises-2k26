<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        form {
            width: 400px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input,
        select,
        textarea,
        button {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        output {
            display: block;
            margin-top: 10px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <form onsubmit="showMessage(event)">
        <h2>Event Registration</h2>

        <input type="text" placeholder="Enter your name" required autofocus>

        <input type="email" placeholder="Enter your email" required>

        <input type="date" required>

        <select required>
            <option value="">Select Event</option>
            <option>Music Festival</option>
            <option>Food Fair</option>
            <option>Sports Meet</option>
        </select>

        <textarea rows="4" placeholder="Enter your message" required></textarea>

        <button type="submit">Register</button>

        <output id="message"></output>
    </form>

    <script>
        function showMessage(event) {
            event.preventDefault();
            document.getElementById("message").value =
                "Registration submitted successfully!";
        }
    </script>

</body>
</html>
