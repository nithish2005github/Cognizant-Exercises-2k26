<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>
    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="welcomeBanner">
        <h2>Welcome, Resident!</h2>
        <p class="highlight">Registration is now open for upcoming events.</p>
        <p>
            Grab your
            <span style="color:red; font-weight:bold;">
                Special Offer
            </span>
            today.
        </p>
    </div>

    <p class="highlight">Don't miss the summer community festival.</p>

</body>
</html>
