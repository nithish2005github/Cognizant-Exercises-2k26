<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model and Layout Control</title>
    <link rel="stylesheet" href="8.styles.css">
</head>
<body>

    <h1>Community Events</h1>

    <div class="eventCard">
        <h2>Music Festival</h2>
        <p>Enjoy live music and entertainment.</p>
    </div>

    <div class="eventCard">
        <h2>Food Fair</h2>
        <p>Explore delicious local cuisine.</p>
    </div>

    <form>
        <input type="text" placeholder="Enter Your Name">
    </form>

    <div class="hiddenBox">
        visibility: hidden
    </div>

    <div class="noneBox">
        display: none
    </div>

</body>
</html>
