<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Community Portal</title>
    <link rel="stylesheet" href="10.styles.css">
</head>
<body>

<header id="home">
    <h1>ABC City Community Event Portal</h1>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#events">Events</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
</nav>

<section id="events" class="events">

    <div class="eventCard">
        <img src="https://picsum.photos/id/1035/300/200" alt="Music Festival">
        <h3>Music Festival</h3>
    </div>

    <div class="eventCard">
        <img src="https://picsum.photos/id/292/300/200" alt="Food Fair">
        <h3>Food Fair</h3>
    </div>

    <div class="eventCard">
        <img src="https://picsum.photos/id/433/300/200" alt="Sports Meet">
        <h3>Sports Meet</h3>
    </div>

</section>

<section id="gallery">

    <h2 style="text-align:center; margin:20px 0;">
        Event Gallery
    </h2>

    <div class="events">

        <div class="eventCard">
            <img src="https://picsum.photos/id/1011/300/200" alt="Community Gathering">
            <h3>Community Gathering</h3>
        </div>

        <div class="eventCard">
            <img src="https://picsum.photos/id/1015/300/200" alt="Volunteer Program">
            <h3>Volunteer Program</h3>
        </div>

        <div class="eventCard">
            <img src="https://picsum.photos/id/1025/300/200" alt="Outdoor Activities">
            <h3>Outdoor Activities</h3>
        </div>

    </div>

</section>

<section id="contact">

    <h2 style="text-align:center; margin:20px 0;">
        Contact Us
    </h2>

    <div style="text-align:center; padding:20px;">
        <p>Email: events@abccity.org</p>
        <p>Phone: +91 9876543210</p>
        <p>ABC City Council</p>
    </div>

</section>

</body>
</html>
