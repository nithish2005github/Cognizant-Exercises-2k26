<!DOCTYPE html>

    <title>Bootstrap Structure</title>

    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">

        <h2>Bootstrap Directory Structure</h2>

                Icons Folder - Contains Bootstrap Icons
            </li>
        </ul>

    </div>

</body>
